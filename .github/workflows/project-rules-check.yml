name: 项目规则检查

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  project-rules-check:
    name: 项目规则检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置执行权限
      run: chmod +x ./scripts/pre-commit-check.sh
      
    - name: 运行项目规则检查
      id: rules-check
      run: |
        ./scripts/pre-commit-check.sh 2>&1 | tee check-output.log
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        
    - name: 上传检查报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: project-rules-check-report
        path: check-output.log
        
    - name: 检查结果处理
      if: steps.rules-check.outputs.exit_code != '0'
      run: |
        echo "项目规则检查失败，请查看检查报告"
        exit 1
        
    - name: 检查通过
      if: steps.rules-check.outputs.exit_code == '0'
      run: |
        echo "项目规则检查通过！"

  security-audit:
    name: 安全审计
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 敏感信息扫描
      run: |
        echo "=== 敏感信息扫描 ==="
        patterns=("appid" "secret" "password" "token" "api_key" "private_key")
        found=0
        for pattern in "${patterns[@]}"; do
          matches=$(grep -r "$pattern" miniprogram/ --include="*.js" --include="*.json" 2>/dev/null | grep -v "//.*" || true)
          if [ -n "$matches" ]; then
            echo "⚠️ 发现可能的敏感信息 ($pattern):"
            echo "$matches" | head -10
            found=1
          fi
        done
        if [ "$found" -eq 1 ]; then
          exit 1
        fi
        echo "✅ 敏感信息扫描通过"

  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 代码统计
      run: |
        echo "=== 代码统计 ==="
        echo "JavaScript 文件数量: $(find miniprogram/ -name "*.js" | wc -l)"
        echo "总代码行数: $(find miniprogram/ -name "*.js" -exec wc -l {} + | tail -1 | awk '{print $1}')"
        echo "WXSS 文件数量: $(find miniprogram/ -name "*.wxss" | wc -l)"
        echo "WXML 文件数量: $(find miniprogram/ -name "*.wxml" | wc -l)"
